services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: infra-${PROJECT_SLUG}-kafka
    ports:
      - "${HOST_PORT_KAFKA}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: infra-${PROJECT_SLUG}-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://infra-${PROJECT_SLUG}-kafka:29092,PLAINTEXT_HOST://localhost:${HOST_PORT_KAFKA}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ${PROJECT_DATA_PATH}/kafka:/var/lib/kafka/data
    networks:
      - df-network
    labels:
      managed-by: docker-framework
      df.type: infra
      df.resource: kafka
      df.project: ${PROJECT_SLUG}
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy

networks:
  df-network:
    name: df-network
    external: true
